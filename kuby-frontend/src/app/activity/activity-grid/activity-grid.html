@if (activities(); as activities) {
<p-contextmenu
  #cm
  [ngClass]="hideContextMenu() ? 'hide' : ''"
  [model]="contextMenuCommands()"
  (onShow)="onContextMenuShow()"
  (onHide)="onContextMenuHide()"
/>
<!-- #table -->
<!-- [customSort]="true"
(sortFunction)="customSort($event)" -->
<p-table
  scrollHeight="flex"
  [value]="activities"
  [scrollable]="true"
  [contextMenu]="cm"
  [(selection)]="selectedActivity"
  [(contextMenuSelection)]="selectedActivity"
>
  <ng-template #header>
    <tr>
      <th pSortableColumn="label">Label <p-sortIcon field="label" /></th>
      <th>Status</th>
      <th pSortableColumn="createdAt">Erstellt am <p-sortIcon field="createdAt" /></th>
      <th></th>
    </tr>
  </ng-template>
  <ng-template #body let-activity>
    @if (activity.isActive) {
    <tr [pContextMenuRow]="activity">
      <td>{{ activity.label }}</td>
      <td>{{ 'Aktiv' }}</td>
      <td>{{ activity.createdAt | date : 'dd.MM.yyyy HH:mm:ss' }}</td>
      <td>
        <p-menu
          #menu
          [model]="contextMenuCommands()"
          [popup]="true"
          appendTo="body"
          (onShow)="onMenuShow(activity)"
        />
        <p-button severity="secondary" (onClick)="cm.toggle($event)" icon="pi pi-ellipsis-v" />
      </td>
    </tr>
    } @else {
    <tr>
      <td>{{ activity.label }}</td>
      <td>{{ 'Gelöscht' }}</td>
      <td>{{ activity.createdAt | date : 'dd.MM.yyyy HH:mm:ss' }}</td>
    </tr>
    }
  </ng-template>
</p-table>
}
