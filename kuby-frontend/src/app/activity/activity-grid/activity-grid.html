@if (activities(); as activities) {
<p-contextmenu #cm [model]="contextMenuCommands()" (onHide)="onContextMenuHide()" />
<p-table
  scrollHeight="flex"
  [value]="activities"
  [scrollable]="true"
  [contextMenu]="cm"
  [(contextMenuSelection)]="selectedActivity"
>
  <ng-template #header>
    <tr>
      <th>Label</th>
      <th>Status</th>
      <th>Erstellt am</th>
    </tr>
  </ng-template>
  <ng-template #body let-activity>
    <tr [pContextMenuRow]="activity">
      <td>{{ activity.label }}</td>
      <td>{{ activity.isActive ? 'Aktiv' : 'Gelöscht' }}</td>
      <td>{{ activity.createdAt | date : 'dd.MM.yyyy HH:mm:ss' }}</td>
    </tr>
  </ng-template>
</p-table>
}
